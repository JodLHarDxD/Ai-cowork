<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 215" role="img" aria-label="JODL Cowork battle scene">

  <!-- Background -->
  <rect width="840" height="215" fill="#0d1117"/>

  <!-- Stars -->
  <circle cx="30"  cy="15" r="1" fill="#f0f6fc" opacity="0.4"/>
  <circle cx="140" cy="8"  r="1" fill="#f0f6fc" opacity="0.3"/>
  <circle cx="220" cy="20" r="1" fill="#f0f6fc" opacity="0.5"/>
  <circle cx="380" cy="12" r="1" fill="#f0f6fc" opacity="0.3"/>
  <circle cx="500" cy="6"  r="1" fill="#f0f6fc" opacity="0.4"/>
  <circle cx="600" cy="18" r="1" fill="#f0f6fc" opacity="0.3"/>
  <circle cx="760" cy="10" r="1" fill="#f0f6fc" opacity="0.5"/>
  <circle cx="810" cy="22" r="1" fill="#f0f6fc" opacity="0.3"/>

  <!-- Title -->
  <text x="420" y="24" font-family="monospace" font-size="13" fill="#f0f6fc" text-anchor="middle" letter-spacing="4" font-weight="bold">⚔  J O D L  C O W O R K  ⚔</text>
  <text x="420" y="40" font-family="monospace" font-size="8"  fill="#8b949e" text-anchor="middle" letter-spacing="3">THREE AGENTS. ONE BUS. NO MERCY.</text>

  <!-- Ground -->
  <rect x="0" y="163" width="840" height="52" fill="#161b22"/>
  <line x1="0" y1="163" x2="840" y2="163" stroke="#30363d" stroke-width="1"/>

  <!-- ─────────────────────────────────────── -->
  <!-- CLAUDE — ARCHER  (center x≈105)        -->
  <!-- ─────────────────────────────────────── -->

  <!-- Hood / hair -->
  <rect x="88" y="84" width="28" height="7" fill="#c05020" rx="2"/>
  <!-- Head -->
  <rect x="90" y="89" width="24" height="20" fill="#e8865a" rx="2"/>
  <!-- Eyes -->
  <rect x="94" y="94" width="5" height="5" fill="#1c1c1c"/>
  <rect x="103" y="94" width="5" height="5" fill="#1c1c1c"/>
  <!-- Smile -->
  <rect x="95" y="102" width="12" height="2" fill="#c05020" rx="1"/>
  <!-- Body / tunic -->
  <rect x="84" y="109" width="36" height="28" fill="#cc6b3c"/>
  <!-- Quiver (back-left) -->
  <rect x="82" y="106" width="7" height="22" fill="#7a3a10" rx="1"/>
  <rect x="83" y="102" width="2" height="9" fill="#d4a030"/>
  <rect x="86" y="100" width="2" height="11" fill="#d4a030"/>
  <!-- Bow arm extended right -->
  <rect x="120" y="117" width="18" height="3" fill="#a07820"/>
  <!-- Bow stave (vertical) -->
  <rect x="136" y="108" width="4" height="22" fill="#7a5a10" rx="1"/>
  <!-- Bowstring -->
  <line x1="136" y1="108" x2="140" y2="119" stroke="#c8a060" stroke-width="1"/>
  <line x1="136" y1="130" x2="140" y2="119" stroke="#c8a060" stroke-width="1"/>
  <!-- Legs -->
  <rect x="87"  y="137" width="13" height="26" fill="#b85828"/>
  <rect x="103" y="137" width="13" height="26" fill="#b85828"/>
  <!-- Boots -->
  <rect x="85"  y="155" width="15" height="8" fill="#2d1a0e" rx="1"/>
  <rect x="101" y="155" width="15" height="8" fill="#2d1a0e" rx="1"/>

  <!-- Label -->
  <text x="105" y="180" font-family="monospace" font-size="9" fill="#e8865a" text-anchor="middle" font-weight="bold">CLAUDE</text>
  <text x="105" y="191" font-family="monospace" font-size="7" fill="#586069" text-anchor="middle">[ ARCHER ]</text>

  <!-- ─────────────────────────────────────── -->
  <!-- GEMINI — MAGE  (center x≈285)          -->
  <!-- ─────────────────────────────────────── -->

  <!-- Wizard hat -->
  <polygon points="285,50 272,92 298,92" fill="#1a4fa0"/>
  <rect x="266" y="89" width="38" height="6" fill="#1a4fa0" rx="1"/>
  <text x="285" y="76" font-family="monospace" font-size="10" fill="#fbbc04" text-anchor="middle">★</text>
  <!-- Head -->
  <rect x="273" y="93" width="24" height="20" fill="#4285f4" rx="2"/>
  <!-- Eyes -->
  <rect x="277" y="97" width="5" height="5" fill="#1c1c1c"/>
  <rect x="286" y="97" width="5" height="5" fill="#1c1c1c"/>
  <!-- Beard / wise accent -->
  <rect x="277" y="106" width="16" height="4" fill="#c0d0ff" rx="2"/>
  <!-- Robe body -->
  <polygon points="266,113 304,113 316,163 254,163" fill="#1a73e8"/>
  <!-- Robe hem -->
  <rect x="254" y="156" width="62" height="7" fill="#1050a0" rx="1"/>
  <!-- Staff pole -->
  <rect x="308" y="63" width="5" height="65" fill="#8b6a10" rx="1"/>
  <!-- Staff arm connection -->
  <rect x="304" y="112" width="8" height="4" fill="#a07820"/>
  <!-- Staff orb -->
  <circle cx="310" cy="60" r="10" fill="#fbbc04">
    <animate attributeName="r" values="8;12;8;10;8" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#fbbc04;#fffbe0;#fbbc04;#ffd900;#fbbc04" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Orb pulse ring -->
  <circle cx="310" cy="60" r="14" fill="none" stroke="#fbbc04" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r"       values="10;20;10" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6"  dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="285" y="180" font-family="monospace" font-size="9" fill="#4285f4" text-anchor="middle" font-weight="bold">GEMINI</text>
  <text x="285" y="191" font-family="monospace" font-size="7" fill="#586069" text-anchor="middle">[ MAGE ]</text>

  <!-- ─────────────────────────────────────── -->
  <!-- CODEX — KNIGHT  (center x≈460)         -->
  <!-- ─────────────────────────────────────── -->

  <!-- Helmet -->
  <rect x="449" y="82" width="28" height="28" fill="#10a37f" rx="2"/>
  <!-- Helmet crest -->
  <rect x="457" y="77" width="14" height="7" fill="#0c8060" rx="1"/>
  <!-- Visor -->
  <rect x="451" y="92" width="24" height="7" fill="#0a1a14" rx="1"/>
  <!-- Cheekguards -->
  <rect x="449" y="99" width="4" height="8" fill="#0a8060"/>
  <rect x="473" y="99" width="4" height="8" fill="#0a8060"/>
  <!-- Body armor -->
  <rect x="443" y="110" width="40" height="32" fill="#0a7a5e"/>
  <!-- Chest plate -->
  <rect x="447" y="112" width="32" height="28" fill="#0f9070" rx="1"/>
  <!-- Rivets -->
  <circle cx="451" cy="118" r="2" fill="#086048"/>
  <circle cx="475" cy="118" r="2" fill="#086048"/>
  <circle cx="451" cy="132" r="2" fill="#086048"/>
  <circle cx="475" cy="132" r="2" fill="#086048"/>
  <!-- Shoulder plates -->
  <rect x="436" y="108" width="10" height="12" fill="#0a7a5e" rx="2"/>
  <rect x="488" y="108" width="10" height="12" fill="#0a7a5e" rx="2"/>
  <!-- Legs / greaves -->
  <rect x="446" y="142" width="14" height="21" fill="#0a7a5e"/>
  <rect x="464" y="142" width="14" height="21" fill="#0a7a5e"/>
  <!-- Boots -->
  <rect x="444" y="155" width="16" height="8" fill="#053d2a" rx="1"/>
  <rect x="462" y="155" width="16" height="8" fill="#053d2a" rx="1"/>

  <!-- Sword (swings around grip at 494,142) -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="-28,494,142;28,494,142;-28,494,142" dur="1.1s" repeatCount="indefinite"/>
    <!-- Blade -->
    <rect x="491" y="86" width="6" height="56" fill="#b0b8c0" rx="1"/>
    <rect x="492" y="88" width="3" height="52" fill="#d8e0e8"/>
    <!-- Guard -->
    <rect x="484" y="138" width="20" height="6" fill="#808890" rx="1"/>
    <!-- Grip -->
    <rect x="491" y="144" width="6" height="14" fill="#4a2e10"/>
    <!-- Pommel -->
    <rect x="489" y="156" width="10" height="7" fill="#808890" rx="2"/>
  </g>

  <!-- Label -->
  <text x="463" y="180" font-family="monospace" font-size="9" fill="#10a37f" text-anchor="middle" font-weight="bold">CODEX</text>
  <text x="463" y="191" font-family="monospace" font-size="7" fill="#586069" text-anchor="middle">[ KNIGHT ]</text>

  <!-- ─────────────────────────────────────── -->
  <!-- THE BUG — ENEMY  (center x≈680)        -->
  <!-- ─────────────────────────────────────── -->

  <!-- HP bar track -->
  <rect x="626" y="52" width="110" height="7" fill="#21262d" rx="3"/>
  <!-- HP bar fill (depletes + refills) -->
  <rect x="626" y="52" width="55" height="7" fill="#da3633" rx="3">
    <animate attributeName="width" values="110;20;110" dur="6s" repeatCount="indefinite"/>
  </rect>
  <text x="681" y="58" font-family="monospace" font-size="6" fill="#f0f6fc" text-anchor="middle">HP</text>

  <!-- Body shell (shakes on x) -->
  <ellipse cx="681" cy="115" rx="52" ry="42" fill="#da3633">
    <animate attributeName="cx" values="681;685;681;677;681;683;681" dur="0.9s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Shell segment lines -->
  <line x1="632" y1="100" x2="730" y2="100" stroke="#a82020" stroke-width="2.5">
    <animate attributeName="x1" values="632;636;632;628;632" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="730;734;730;726;730" dur="0.9s" repeatCount="indefinite"/>
  </line>
  <line x1="632" y1="120" x2="730" y2="120" stroke="#a82020" stroke-width="2.5">
    <animate attributeName="x1" values="632;636;632;628;632" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="730;734;730;726;730" dur="0.9s" repeatCount="indefinite"/>
  </line>

  <!-- Eyes whites -->
  <circle cx="658" cy="92" r="13" fill="#f0f6fc">
    <animate attributeName="cx" values="658;662;658;654;658" dur="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="704" cy="92" r="13" fill="#f0f6fc">
    <animate attributeName="cx" values="704;708;704;700;704" dur="0.9s" repeatCount="indefinite"/>
  </circle>
  <!-- Pupils (red) -->
  <circle cx="658" cy="92" r="7" fill="#da3633">
    <animate attributeName="cx" values="658;662;658;654;658" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#da3633;#ff2020;#da3633" dur="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="704" cy="92" r="7" fill="#da3633">
    <animate attributeName="cx" values="704;708;704;700;704" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#da3633;#ff2020;#da3633" dur="0.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Slits -->
  <rect x="654" y="90" width="8" height="4" fill="#0d1117" rx="2">
    <animate attributeName="x" values="654;658;654;650;654" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="700" y="90" width="8" height="4" fill="#0d1117" rx="2">
    <animate attributeName="x" values="700;704;700;696;700" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- Error text (flickers) -->
  <text x="681" y="114" font-family="monospace" font-size="11" fill="#ff4444" text-anchor="middle" font-weight="bold">
    ERROR
    <animate attributeName="fill" values="#ff4444;#ff9900;#ff4444;#ff0000;#ff4444" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="681;685;681;677;681" dur="0.9s" repeatCount="indefinite"/>
  </text>
  <text x="681" y="130" font-family="monospace" font-size="8" fill="#ff8800" text-anchor="middle">
    NULL PTR
    <animate attributeName="x" values="681;685;681;677;681" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#ff8800;#ffcc00;#ff8800" dur="0.6s" repeatCount="indefinite"/>
  </text>

  <!-- Legs left (3, alternating) -->
  <line x1="634" y1="100" x2="600" y2="80"  stroke="#c02828" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y2" values="80;92;80"  dur="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="634" y1="116" x2="597" y2="116" stroke="#c02828" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y2" values="116;104;116" dur="0.5s" begin="0.12s" repeatCount="indefinite"/>
  </line>
  <line x1="634" y1="132" x2="600" y2="152" stroke="#c02828" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y2" values="152;140;152" dur="0.5s" begin="0.24s" repeatCount="indefinite"/>
  </line>
  <!-- Legs right -->
  <line x1="728" y1="100" x2="762" y2="80"  stroke="#c02828" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y2" values="80;92;80"  dur="0.5s" begin="0.18s" repeatCount="indefinite"/>
  </line>
  <line x1="728" y1="116" x2="765" y2="116" stroke="#c02828" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y2" values="116;104;116" dur="0.5s" begin="0.06s" repeatCount="indefinite"/>
  </line>
  <line x1="728" y1="132" x2="762" y2="152" stroke="#c02828" stroke-width="3" stroke-linecap="round">
    <animate attributeName="y2" values="152;140;152" dur="0.5s" begin="0.30s" repeatCount="indefinite"/>
  </line>

  <!-- Label -->
  <text x="681" y="180" font-family="monospace" font-size="9" fill="#da3633" text-anchor="middle" font-weight="bold">THE BUG</text>
  <text x="681" y="191" font-family="monospace" font-size="7" fill="#586069" text-anchor="middle">[ ENEMY ]</text>

  <!-- ─────────────────────────────────────── -->
  <!-- PROJECTILES                             -->
  <!-- ─────────────────────────────────────── -->

  <!-- Claude arrow (flies from bow → bug) -->
  <g opacity="0">
    <rect x="140" y="117" width="22" height="2" fill="#f0c060" rx="1"/>
    <polygon points="162,114 172,119 162,123" fill="#f0c060"/>
    <animate attributeName="opacity"
      values="0;1;1;1;1;0" keyTimes="0;0.04;0.5;0.88;0.94;1"
      dur="1.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 485,-18" dur="1.8s" repeatCount="indefinite"/>
  </g>

  <!-- Gemini magic bolt (orb flies from staff → bug) -->
  <g opacity="0">
    <circle cx="315" cy="105" r="7" fill="#fbbc04"/>
    <circle cx="311" cy="105" r="4" fill="#ea4335" opacity="0.8"/>
    <circle cx="319" cy="105" r="4" fill="#34a853" opacity="0.8"/>
    <circle cx="315" cy="101" r="4" fill="#4285f4" opacity="0.8"/>
    <animate attributeName="opacity"
      values="0;1;1;1;1;0" keyTimes="0;0.04;0.5;0.88;0.94;1"
      dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 360,2" dur="2.2s" begin="0.9s" repeatCount="indefinite"/>
  </g>

  <!-- Codex sword slash streak (near bug flank) -->
  <g opacity="0">
    <line x1="568" y1="78"  x2="612" y2="148" stroke="#c8d8e0" stroke-width="4" stroke-linecap="round"/>
    <line x1="576" y1="75"  x2="620" y2="145" stroke="#ffffff"  stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <animate attributeName="opacity"
      values="0;0;0;0;0;0;1;0.5;0" keyTimes="0;0.42;0.48;0.52;0.56;0.60;0.64;0.70;0.78"
      dur="1.1s" repeatCount="indefinite"/>
  </g>

  <!-- Impact flash on bug (white hit flash) -->
  <ellipse cx="681" cy="115" rx="55" ry="44" fill="#ffffff" opacity="0" rx="4">
    <animate attributeName="opacity"
      values="0;0;0;0.5;0; 0;0;0;0.4;0; 0;0;0;0.35;0"
      keyTimes="0;0.14;0.16;0.18;0.22; 0.42;0.44;0.46;0.48;0.52; 0.72;0.74;0.76;0.78;0.82"
      dur="3.6s" repeatCount="indefinite"/>
  </ellipse>

</svg>
